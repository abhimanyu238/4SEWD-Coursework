<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In · Athenaeum Library System</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-screen">
  <div class="login-card">
    <div class="login-stamp">
      <span class="tag">Admin Access Only</span>
      <h1>Athenaeum</h1>
    </div>
    <div class="login-body">

      <div class="login-error" id="login-error" style="display:none;">
        <span>⚠</span>
        <span>Incorrect username or password. Please try again.</span>
      </div>

      <form id="login-form" data-validate novalidate>
        <div class="field">
          <label for="username">Username <span class="req">*</span></label>
          <input type="text" id="username" name="username" data-required placeholder="admin">
          <div class="field-error-msg">Username is required.</div>
        </div>

        <div class="field">
          <label for="password">Password <span class="req">*</span></label>
          <input type="password" id="password" name="password" data-required placeholder="••••••••">
          <div class="field-error-msg">Password is required.</div>
        </div>

        <div class="form-banner" id="form-banner" style="display:none;">
          <span>⚠</span>
          <span>Please enter both a username and a password.</span>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:6px;">Sign In</button>
      </form>

      <p class="login-foot">Passwords are hashed and never stored in plain text.<br>Unauthenticated users are redirected here automatically.</p>
    </div>
  </div>
</div>
<script src="js/app.js"></script>
</body>
</html>
